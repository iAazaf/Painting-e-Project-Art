<div class=" container mt-5">

    <div id="cart-items"></div>

    <div class="total-box mt-4">
        <h4>Total: $<span id="total">0</span></h4>

        <a href="paintings.html" class="btn btn-warning w-100 mt-3">
            Continue Shopping
        </a>

        <button class="btn btn-warning w-100 mt-3 checkout-btn">
            Proceed to Checkout
        </button>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// RENDER
function renderCart(){

    let total = 0;

    $("#cart-items").html("");

    if(cart.length === 0){
        $("#cart-items").html(`
            <div class="empty">
                <h3>Your Cart is Empty</h3>
            </div>
        `);
        $("#total").text("0");
        checkCartStatus();
        return;
    }

    cart.forEach((item,index)=>{

        let price = parseFloat(item.price.replace("$",""));
        total += price;

        $("#cart-items").append(`
        <div class="cart-box row align-items-center g-3 mb-3">

            <div class="col-3">
                <img src="${item.img}" class="cart-img">
            </div>

            <div class="col-6">
                <h5>${item.name}</h5>
                <p class="text-warning">$${price}</p>
            </div>

            <div class="col-3 text-end">
                <button class="remove-btn" data-index="${index}">
                    Remove
                </button>
            </div>

        </div>
        `);
    });

    $("#total").text(total.toFixed(2));

    checkCartStatus();
}
// CHECK STATUS
function checkCartStatus(){

    let btn = $(".checkout-btn");

    if(cart.length === 0){
        btn.prop("disabled", true);
        btn.text("Cart is Empty");
    } else {
        btn.prop("disabled", false);
        btn.text("Proceed to Checkout");
    }
}
// CHECKOUT CLICK
$(document).on("click",".checkout-btn",function(){

    if(cart.length === 0){
        alert("Your cart is empty");
        return;
    }
    window.location.href = "checkout.html";
});
$(document).on("click",".remove-btn",function(){

    let index = $(this).data("index");

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    renderCart();
});

// INIT
renderCart();

</script>
<script src="script.js"></script>
</body>
