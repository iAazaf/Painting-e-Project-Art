<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile | Galleria</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/user-profile.css">
<style>

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top py-3">
    <div class="container">

        <a href="images/logo.png" class="navbar-brand fw-bold fs-2 text-warning font-serif">
            <img src="images/logo.png" class="rounded me-2" alt="Logo" height="50">Galleria
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto gap-2">

                <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="gallery.html">Gallery</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="paintings.html">Paintings</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>

                <li class="nav-item btn-login">
                    <a class="nav-link btn text-white px-3 ms-2 fw-medium" href="login.html">
                        <i class="fas fa-user me-2"></i>Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link btn text-white px-3 ms-2 fw-medium" href="sitemap.html">
                        <i class="fas fa-sitemap me-2"></i>Sitemap
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container py-5">

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card p-4 text-center">

                <div class="profile-img mb-3">
                    <img src="https://via.placeholder.com/150" alt="">
                </div>

                <h4 id="displayUserName" class="text-warning">Guest User</h4>
                <p id="displayUserEmail" class="text-secondary">guest@example.com</p>
                <hr>
                <div class="list-group text-start">
                    <a href="wishlist.html" class="list-group-item">
                        <i class="bi bi-heart me-2"></i> Wishlist
                    </a>
                    <a href="cart.html" class="list-group-item">
                        <i class="bi bi-cart me-2"></i> My Cart
                    </a>
                    <button onclick="logout()" class="list-group-item text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h3 class="mb-4 text-warning">Account Overview</h3>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="stats-box">
                            <h6>Wishlist Items</h6>
                            <h3 class="text-warning">5</h3>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="stats-box">
                            <h6>Pending Orders</h6>
                            <h3 class="text-warning">1</h3>
                        </div>
                    </div>

                </div>

                <h5 class="text-warning">Personal Info</h5>
            </div>

        </div>

    </div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(user){
    document.getElementById("displayUserName").innerText = user.name || "User";
    document.getElementById("displayUserEmail").innerText = user.email || "user@email.com";
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
<script src="script.js"></script>
</body>
</html>
