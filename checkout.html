<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galleria | Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/checkout.css">
<style>


</style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center text-warning mb-5">Checkout</h2>

    <div class="row g-4">

<form id="checkout-form">

<div class="row g-3">
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="First Name" required>
    </div>
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Last Name" required>
    </div>
    <div class="col-12">
        <input type="email" class="form-control" placeholder="Email" required>
    </div>
    <div class="col-12">
        <input type="text" class="form-control" placeholder="Address" required>
    </div>
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="City" required>
    </div>
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Zip Code" required>
    </div>
</div>

<select class="form-control mt-3" required>
    <option value="">Select Payment Method</option>
    <option>Cash on Delivery</option>
    <option>Credit Card</option>
</select>

</form>
        <div class="col-lg-5">
            <div class="summary-box">
                <h5 class="mb-4">Order Summary</h5>
                <div id="summary-items"></div>
                <hr>
                <h5>Total: $<span id="total">0</span></h5>
                <button class="btn btn-warning w-100 mt-3" onclick="handleCheckout()">
    Place Order
</button>
                    <a href="cart.html" class="btn btn-outline-warning w-100 mt-2">
                     ← Back to Cart
                    </a>
            </div>
        </div>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadSummary(){

    let total = 0;
    let html = "";

    if(cart.length === 0){
        document.getElementById("summary-items").innerHTML = `
            <p class="text-danger">Your cart is empty</p>
        `;
        document.getElementById("total").innerText = "0";
        return;
    }

    cart.forEach(item=>{
        let price = parseFloat(item.price.replace("$",""));
        total += price;

        html += `
        <div class="d-flex justify-content-between mb-2">
            <span>${item.name}</span>
            <span>$${price}</span>
        </div>
        `;
    });

    document.getElementById("summary-items").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

function handleCheckout(){

    let form = document.getElementById("checkout-form");

   
    if(!form.checkValidity()){
        form.reportValidity();
        return;
    }


    if(cart.length === 0){
        alert("Your cart is empty");
        return;
    }

 
    localStorage.removeItem("cart");

    
    window.location.href = "order-success.html";
}


loadSummary();

</script>

</body>
</html>
