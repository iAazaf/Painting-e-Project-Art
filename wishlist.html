        <div class="row g-4 mt-5" id="wishlistContainer"></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(document).ready(function(){

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    let container = $("#wishlistContainer");

if(wishlist.length === 0){
    container.html(`
        <div class="text-center py-5">
            <h4 class="text-white mb-3">
                No items in wishlist yet!
            </h4>

            <p class="text-secondary mb-4">
                Start adding your favorite paintings now!
            </p>
            <a href="paintings.html" class="btn btn-warning px-4 fw-bold">
                Browse Paintings
            </a>
        </div>
    `);
    return;
}

    wishlist.forEach((item, index) => {

        container.append(`
            <div class="col-md-4">
                <div class="card-box p-3">
                    <img src="${item.img}" class="wishlist-img">
                    <h5 class="mt-3">${item.name}</h5>
                    <p class="price">${item.price}</p>

                    <button class="btn btn-danger w-100 remove-btn" data-index="${index}">
                        Remove
                    </button>
                </div>
            </div>
        `);

    });

    
    $(document).on("click", ".remove-btn", function(){

        let i = $(this).data("index");

        wishlist.splice(i,1);

        localStorage.setItem("wishlist", JSON.stringify(wishlist));

        location.reload();

    });

});
</script>
<script src="script.js"></script>
</body>
